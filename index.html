*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:var(--paper);color:var(--ink)}
.bar{display:flex;align-items:center;gap:4px;padding:5px 8px;background:var(--pine);overflow-x:auto}
.tab{font:inherit;font-size:12.5px;font-weight:500;padding:4px 9px;border-radius:14px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#F2EFE6;cursor:pointer;white-space:nowrap;flex:none}
.tab.on{background:#F2EFE6;color:var(--pine);border-color:#F2EFE6}
.zbtn{font:inherit;font-size:14px;font-weight:700;width:28px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#F2EFE6;cursor:pointer;line-height:1;flex:none}
.zbtn.wide{width:auto;padding:0 8px;font-size:11.5px;font-weight:500}
#zval{font-size:10.5px;color:#F2EFE6;opacity:.85;min-width:32px;text-align:center;font-variant-numeric:tabular-nums;flex:none}
.disc{margin-left:auto;font-size:10px;color:#F2EFE6;opacity:.75;white-space:nowrap;flex:none}
#scroller{overflow:auto;height:calc(100vh - 37px - 44px);touch-action:pan-x pan-y;-webkit-overflow-scrolling:touch}
footer{height:44px;padding:5px 10px;font-size:9px;line-height:1.5;color:#6B675B;background:#F1EDE2;border-top:1px solid var(--line);overflow:hidden}
footer a{color:#14352A}
.hrow{display:flex;position:sticky;top:0;z-index:5}
.hcell{flex:none;background:var(--paper);border-bottom:1.5px solid var(--line);border-right:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:9.5px;font-weight:700;line-height:1.15;padding:0 2px;border-top:3px solid transparent;overflow:hidden}
.corner{position:sticky;left:0;z-index:6}
.brow{display:flex}
.timecol{flex:none;position:sticky;left:0;z-index:4;background:var(--paper);border-right:1px solid var(--line)}
.timecol span{position:absolute;right:4px;font-size:9.5px;color:#8A8577;font-variant-numeric:tabular-nums}
.col{flex:none;border-right:1px solid var(--line);position:relative}
.hline{position:absolute;left:0;right:0;border-top:1px solid #EEEAE0}
.ev{position:absolute;overflow:hidden;border-radius:4px;border-left:2.5px solid transparent}
.ev .tm{display:block;font-size:9px;opacity:.8;font-variant-numeric:tabular-nums}
.ev .nm{display:block;font-weight:700;word-break:break-word;line-height:1.15}
.ev.cxl .nm{text-decoration:line-through}
.ev.cxl{outline:1.5px solid var(--cxl)}
.ev .cb{font-size:8.5px;color:var(--cxl);font-weight:700}
.ev{cursor:pointer}
#sheetbg{display:none;position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:50}
#sheet{display:none;position:fixed;left:0;right:0;bottom:0;z-index:51;background:#FAF8F3;border-radius:16px 16px 0 0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -4px 24px rgba(0,0,0,.25)}
#sheet h3{margin:0 0 2px;font-size:14px;color:#14352A}
#sheet .meta{font-size:11px;color:#8A8577;margin-bottom:10px}
#sheet a{display:flex;align-items:center;gap:8px;padding:11px 12px;margin-bottom:7px;border-radius:10px;text-decoration:none;font-size:13.5px;font-weight:700;border:1px solid var(--line);color:#22302B;background:#fff}
#sheet a span{font-size:11px;font-weight:400;color:#8A8577;margin-left:auto}
#sheet .close{width:100%;font:inherit;font-size:12.5px;padding:9px;border:none;border-radius:10px;background:#EEEAE0;color:#5E5A4E;cursor:pointer;margin-top:2px}

  inner.style.minWidth=(TW+ORDER.length*CW)+"px";
  const hr=document.createElement("div");hr.className="hrow";
  const corner=document.createElement("div");corner.className="hcell corner";corner.style.width=TW+"px";corner.style.height=HD+"px";hr.appendChild(corner);
  ORDER.forEach(name=>{
    const st=STYLE[name];
    const c=document.createElement("div");c.className="hcell";
    c.style.width=CW+"px";c.style.height=HD+"px";
    c.style.borderTopColor=css(st[2]);c.style.color=css(st[1]);
    c.textContent=CW<78?SHORT[name]:name;
    hr.appendChild(c);
  });
  inner.appendChild(hr);
  const hourStep=(60*S<20)?120:60;
  const br=document.createElement("div");br.className="brow";
  const tc=document.createElement("div");tc.className="timecol";tc.style.width=TW+"px";tc.style.height=H+"px";
  const tcin=document.createElement("div");tcin.style.cssText="position:relative;height:"+H+"px;width:100%";
  for(let m=T0;m<=T1;m+=hourStep){const s=document.createElement("span");s.style.top=((m-T0)*S-6)+"px";s.textContent=hh(m);tcin.appendChild(s);}
  tc.appendChild(tcin);br.appendChild(tc);
  ORDER.forEach(name=>{
    const st=STYLE[name];
    const col=document.createElement("div");col.className="col";col.style.width=CW+"px";col.style.height=H+"px";
    for(let m=T0+hourStep;m<T1;m+=hourStep){const ln=document.createElement("div");ln.className="hline";ln.style.top=((m-T0)*S)+"px";col.appendChild(ln);}
    (d.st[name]||[]).forEach(ev=>{
      const a=mn(ev[0]),b=mn(ev[1]),top=(a-T0)*S,h=Math.max((b-a)*S,NF*1.15+3);
      const cxl=ev[3]===1;
      const showTm=h>=30&&ZOOM>=0.75;
      const box=document.createElement("div");
      box.className="ev"+(cxl?" cxl":"");
      box.style.top=(top+0.5)+"px";box.style.height=(h-1)+"px";
      box.style.left="1px";box.style.right="1px";
      box.style.padding=(ZOOM>=0.75?"2px 4px":"0px 2px");
      box.style.background=css(st[0]);box.style.color=css(st[1]);box.style.borderLeftColor=css(st[2]);
      box.title=ev[0]+"-"+ev[1]+" "+ev[2]+(cxl?"（出演キャンセル）":"");
      box.dataset.a=ev[2];box.dataset.s=name;box.dataset.t=ev[0]+"-"+ev[1];
      if(showTm){const tm=document.createElement("span");tm.className="tm";tm.textContent=ev[0]+"-"+ev[1];box.appendChild(tm);}
      const nm=document.createElement("span");nm.className="nm";nm.style.fontSize=NF+"px";nm.textContent=ev[2];box.appendChild(nm);
      if(cxl&&h>=24){const cb=document.createElement("span");cb.className="cb";cb.textContent="キャンセル";box.appendChild(cb);}
      col.appendChild(box);
    });
    br.appendChild(col);
  });
  inner.appendChild(br);
  scEl.appendChild(inner);
  scEl.scrollLeft=rx*scEl.scrollWidth-scEl.clientWidth/2;
  scEl.scrollTop=ry*scEl.scrollHeight-scEl.clientHeight/2;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.d===day));
  const zv=document.getElementById("zval");
  if(zv)zv.textContent=Math.round(ZOOM*100)+"%";
}
document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>render(b.dataset.d)));
let renderQueued=false;
function setZoom(z){
  ZOOM=Math.min(ZMAX,Math.max(ZMIN,z));
  if(renderQueued)return;
  renderQueued=true;
  requestAnimationFrame(()=>{renderQueued=false;render(curDay);});
}
document.getElementById("zin").addEventListener("click",()=>setZoom(ZOOM*1.25));
document.getElementById("zout").addEventListener("click",()=>setZoom(ZOOM/1.25));
document.getElementById("zfit").addEventListener("click",()=>{
  const sc=document.getElementById("scroller");
  setZoom((sc.clientHeight-HD-4)/(T1-T0));
});
(function(){
  const sc=document.getElementById("scroller");
  let pinch=null;
  const GAIN=1.6;
  const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  const mid=t=>({x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2});
  sc.addEventListener("touchstart",e=>{
    if(e.touches.length===2){
      const inner=sc.firstElementChild;
      if(!inner)return;
      const r=sc.getBoundingClientRect();
      const m=mid(e.touches);
      pinch={d:dist(e.touches),z:ZOOM,target:ZOOM,inner};
      inner.style.transformOrigin=(sc.scrollLeft+m.x-r.left)+"px "+(sc.scrollTop+m.y-r.top)+"px";
      inner.style.willChange="transform";
    }
  },{passive:true});
  sc.addEventListener("touchmove",e=>{
    if(pinch&&e.touches.length===2){
      e.preventDefault();
      const ratio=Math.pow(dist(e.touches)/pinch.d,GAIN);
      pinch.target=Math.min(ZMAX,Math.max(ZMIN,pinch.z*ratio));
      pinch.inner.style.transform="scale("+(pinch.target/pinch.z)+")";
      const zv=document.getElementById("zval");
      if(zv)zv.textContent=Math.round(pinch.target*100)+"%";
    }
  },{passive:false});
  const end=()=>{
    if(!pinch)return;
    const t=pinch.target,z0=pinch.z,inner=pinch.inner;
    inner.style.transform="";inner.style.willChange="";
    pinch=null;
    if(Math.abs(t-z0)>0.001){ZOOM=t;render(curDay);}
  };
  sc.addEventListener("touchend",e=>{if(e.touches.length<2)end();});
  sc.addEventListener("touchcancel",end);
})();
(function(){
  const bg=document.getElementById("sheetbg"),sh=document.getElementById("sheet");
  const NOLINK=/^(SAKURA CIRCUS|SPECIAL GUEST|xxxx)/i;
  function cleanName(n){
    return n.replace(/（[^）]*）|\([^)]*\)|【[^】]*】/g,"").replace(/\s+/g," ").trim();
  }
  function open(a,s,t){
    const q=encodeURIComponent(cleanName(a));
    document.getElementById("sh-name").textContent=a;
    document.getElementById("sh-meta").textContent=s+"｜"+t;
    document.getElementById("lk-am").href="https://music.apple.com/jp/search?term="+q;
    document.getElementById("lk-sp").href="https://open.spotify.com/search/"+q;
    document.getElementById("lk-yt").href="https://www.youtube.com/results?search_query="+q;
    bg.style.display="block";sh.style.display="block";
  }
  function close(){bg.style.display="none";sh.style.display="none";}
  document.getElementById("scroller").addEventListener("click",e=>{
    const ev=e.target.closest(".ev");
    if(!ev||!ev.dataset.a)return;
    if(NOLINK.test(ev.dataset.a))return;
    open(ev.dataset.a,ev.dataset.s,ev.dataset.t);
  });
  bg.addEventListener("click",close);
  document.getElementById("sh-close").addEventListener("click",close);
})();
window.addEventListener("resize",()=>setZoom(ZOOM));
render("24");
</script>
</body>
